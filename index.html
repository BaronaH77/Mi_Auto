  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --blue-dark: #0C447C;
      --green: #0F6E56;
      --green-light: #E1F5EE;
      --green-dark: #085041;
      --green-border: #9FE1CB;
      --green-text: #04342C;
      --gray-bg: #F5F5F4;
      --gray-border: rgba(0,0,0,0.12);
      --gray-border-md: rgba(0,0,0,0.22);
      --text: #1a1a18;
      --text-secondary: #6b6b67;
      --white: #ffffff;
      --radius-md: 8px;
      --radius-lg: 14px;
      --radius-xl: 20px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --blue: #378ADD;
        --blue-light: #042C53;
        --blue-dark: #B5D4F4;
        --green: #1D9E75;
        --green-light: #04342C;
        --green-dark: #9FE1CB;
        --green-border: #0F6E56;
        --green-text: #9FE1CB;
        --gray-bg: #1c1c1a;
        --gray-border: rgba(255,255,255,0.1);
        --gray-border-md: rgba(255,255,255,0.2);
        --text: #f0f0ec;
        --text-secondary: #9a9a94;
        --white: #121210;
      }
    }

    html, body {
      height: 100%;
      background: var(--gray-bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 24px);
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-top: 8px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: var(--blue-light);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .card {
      background: var(--white);
      border: 0.5px solid var(--gray-border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-on { background: #1D9E75; }
    .dot-off {
      background: var(--text-secondary);
      opacity: 0.4;
      animation: blink 1.4s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .status-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-text strong {
      color: var(--text);
      font-weight: 600;
    }

    .map-box {
      width: 100%;
      height: 210px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 0.5px solid var(--gray-border);
      background: var(--gray-bg);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .map-placeholder {
      text-align: center;
      color: var(--text-secondary);
    }

    .map-placeholder p {
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.5;
    }

    #leaflet-map {
      width: 100%;
      height: 210px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .photo-wrapper {
      background: var(--white);
      border: 0.5px solid var(--gray-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .photo-header {
      padding: 12px 16px 8px;
    }

    .photo-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      gap: 8px;
    }

    .photo-empty p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .photo-preview-img {
      width: 100%;
      display: block;
      max-height: 220px;
      object-fit: cover;
    }

    .photo-actions {
      padding: 10px 16px 14px;
      display: flex;
      gap: 8px;
    }

    textarea {
      width: 100%;
      padding: 11px 13px;
      font-size: 15px;
      border: 0.5px solid var(--gray-border);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--text);
      resize: none;
      font-family: inherit;
      line-height: 1.5;
      -webkit-appearance: none;
    }

    textarea:focus {
      outline: none;
      border-color: var(--gray-border-md);
    }

    .note-wrapper {
      margin-bottom: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-appearance: none;
      letter-spacing: -0.1px;
    }

    .btn:active { transform: scale(0.97); }

    .btn-blue { background: var(--blue); color: var(--blue-light); }
    .btn-blue:hover { background: var(--blue-dark); }

    .btn-green { background: var(--green); color: var(--green-light); margin-bottom: 10px; }
    .btn-green:hover { background: var(--green-dark); }

    .btn-outline {
      background: var(--white);
      color: var(--text);
      border: 0.5px solid var(--gray-border-md);
    }
    .btn-outline:hover { background: var(--gray-bg); }

    .btn-sm {
      padding: 9px 14px;
      font-size: 14px;
      border-radius: var(--radius-md);
      flex: 1;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn-disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .saved-banner {
      background: var(--green-light);
      border: 0.5px solid var(--green-border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      margin-bottom: 12px;
    }

    .saved-banner p {
      font-size: 14px;
      color: var(--green-text);
      line-height: 1.6;
    }

    .saved-banner strong {
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1a1a18;
      color: #f0f0ec;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    input[type="file"] { display: none; }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
        <circle cx="12" cy="9" r="2.5" fill="#185FA5" stroke="none"/>
      </svg>
    </div>
    <div>
      <h1>Mi Auto</h1>
      <p>Ubicación + foto del lugar</p>
    </div>
  </div>

  <div class="card status-row">
    <div class="dot dot-off" id="dot"></div>
    <p class="status-text" id="status-txt">Buscando tu ubicación...</p>
  </div>

  <div class="map-box" id="map-box">
    <div id="map-inner" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
      <div class="map-placeholder">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#9a9a94" stroke-width="1.5">
          <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        <p>El mapa aparece<br>al guardar tu auto</p>
      </div>
    </div>
  </div>

  <div class="photo-wrapper" id="photo-wrapper">
    <div class="photo-header">
      <p class="field-label">Foto del lugar</p>
    </div>
    <div id="photo-empty" class="photo-empty">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#9a9a94" stroke-width="1.5">
        <rect x="3" y="7" width="18" height="13" rx="2"/>
        <circle cx="12" cy="13" r="3"/>
        <path d="M8 7V5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
      </svg>
      <p>Sin foto todavía</p>
    </div>
    <img id="photo-img" class="photo-preview-img" src="" alt="Foto del estacionamiento" style="display:none;"/>
    <div class="photo-actions" id="photo-actions">
      <button class="btn btn-outline btn-sm" onclick="triggerCamera()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="7" width="18" height="13" rx="2"/>
          <circle cx="12" cy="13" r="3"/>
          <path d="M8 7V5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
        </svg>
        Sacar foto
      </button>
      <button class="btn btn-outline btn-sm" id="btn-remove-photo" onclick="removePhoto()" style="display:none;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Quitar foto
      </button>
    </div>
  </div>

  <div class="note-wrapper" id="note-wrapper">
    <p class="field-label">Nota (piso, columna, referencia...)</p>
    <textarea id="note-input" rows="2" placeholder="Ej: Piso 2, columna B, frente al ascensor"></textarea>
  </div>

  <div id="panel-save">
    <div class="btn-row">
      <button class="btn btn-blue btn-disabled" id="btn-save" onclick="saveLocation()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Guardar auto
      </button>
    </div>
  </div>

  <div id="panel-saved" style="display:none;">
    <div class="saved-banner">
      <p id="saved-info-txt"></p>
    </div>
    <button class="btn btn-green" onclick="openMaps()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      Llevarme al auto
    </button>
    <button class="btn btn-outline" onclick="clearSaved()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
      </svg>
      Ya encontré el auto
    </button>
  </div>

</div>

<input type="file" id="file-input" accept="image/*" capture="environment" onchange="onPhotoSelected(event)"/>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const KEY = 'mi_auto_v2';
  let gps = null;
  let photo = null;
  let mapObj = null;
  let saved = null;

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2600);
  }

  function timeAgo(ts) {
    const diff = Math.round((Date.now() - ts) / 60000);
    const t = new Date(ts).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    if (diff < 1) return `Guardado hace unos segundos · ${t}`;
    if (diff < 60) return `Guardado hace ${diff} min · ${t}`;
    const h = Math.floor(diff / 60), m = diff % 60;
    return `Guardado hace ${h}h${m > 0 ? ' ' + m + ' min' : ''} · ${t}`;
  }

  function initMap(lat, lng) {
    const box = document.getElementById('map-inner');
    box.innerHTML = '<div id="lmap"></div>';
    const lmapEl = document.getElementById('lmap');
    lmapEl.style.cssText = 'width:100%;height:210px;';
    if (mapObj) { mapObj.remove(); mapObj = null; }
    mapObj = L.map('lmap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(mapObj);
    const icon = L.divIcon({
      html: `<div style="width:26px;height:26px;background:#185FA5;border:3px solid #E6F1FB;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.25);"></div>`,
      iconSize: [26, 26], iconAnchor: [13, 26], className: ''
    });
    L.marker([lat, lng], { icon }).addTo(mapObj);
    setTimeout(() => mapObj && mapObj.invalidateSize(), 200);
  }

  function triggerCamera() {
    document.getElementById('file-input').click();
  }

  function onPhotoSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      photo = ev.target.result;
      document.getElementById('photo-img').src = photo;
      document.getElementById('photo-img').style.display = 'block';
      document.getElementById('photo-empty').style.display = 'none';
      document.getElementById('btn-remove-photo').style.display = 'flex';
      toast('Foto lista');
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function removePhoto() {
    photo = null;
    document.getElementById('photo-img').src = '';
    document.getElementById('photo-img').style.display = 'none';
    document.getElementById('photo-empty').style.display = 'flex';
    document.getElementById('btn-remove-photo').style.display = 'none';
  }

  function saveLocation() {
    if (!gps) { toast('Esperando GPS...'); return; }
    const note = document.getElementById('note-input').value.trim();
    saved = { lat: gps.lat, lng: gps.lng, ts: Date.now(), note, photo };
    try { localStorage.setItem(KEY, JSON.stringify(saved)); } catch(e) {}
    renderSaved();
    toast('Auto guardado');
  }

  function clearSaved() {
    saved = null;
    photo = null;
    try { localStorage.removeItem(KEY); } catch(e) {}
    removePhoto();
    document.getElementById('note-input').value = '';
    document.getElementById('panel-save').style.display = 'block';
    document.getElementById('panel-saved').style.display = 'none';
    document.getElementById('note-wrapper').style.display = 'block';
    document.getElementById('photo-actions').style.display = 'flex';
    if (gps) initMap(gps.lat, gps.lng);
    toast('¡Auto encontrado!');
  }

  function openMaps() {
    if (!saved) return;
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${saved.lat},${saved.lng}&travelmode=walking`, '_blank');
  }

  function renderSaved() {
    document.getElementById('panel-save').style.display = 'none';
    document.getElementById('panel-saved').style.display = 'block';
    document.getElementById('note-wrapper').style.display = 'none';
    document.getElementById('photo-actions').innerHTML = '';

    let info = timeAgo(saved.ts);
    if (saved.note) info += `<br><strong>${saved.note}</strong>`;
    document.getElementById('saved-info-txt').innerHTML = info;

    if (saved.photo) {
      document.getElementById('photo-img').src = saved.photo;
      document.getElementById('photo-img').style.display = 'block';
      document.getElementById('photo-empty').style.display = 'none';
    } else {
      removePhoto();
    }

    initMap(saved.lat, saved.lng);
  }

  function setGPS(lat, lng, acc) {
    gps = { lat, lng };
    document.getElementById('dot').className = 'dot dot-on';
    document.getElementById('status-txt').innerHTML = `<strong>Ubicación lista</strong> · ~${Math.round(acc)}m de precisión`;
    document.getElementById('btn-save').classList.remove('btn-disabled');
    if (!saved) initMap(lat, lng);
  }

  function initGPS() {
    if (!navigator.geolocation) {
      document.getElementById('status-txt').textContent = 'GPS no disponible en este navegador';
      return;
    }
    navigator.geolocation.getCurrentPosition(
      p => setGPS(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
      err => {
        const msgs = { 1: 'Permiso de ubicación denegado', 2: 'Ubicación no disponible', 3: 'Tiempo de espera agotado' };
        document.getElementById('status-txt').textContent = msgs[err.code] || 'No se pudo obtener la ubicación';
        const s = tryLoad();
        if (s) { saved = s; renderSaved(); }
      },
      { enableHighAccuracy: true, timeout: 12000 }
    );
    navigator.geolocation.watchPosition(
      p => setGPS(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
      null,
      { enableHighAccuracy: true }
    );
  }

  function tryLoad() {
    try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; }
  }

  const preloaded = tryLoad();
  if (preloaded) { saved = preloaded; }
  initGPS();
  if (saved) setTimeout(() => renderSaved(), 400);
</script>
</body>
</html>
